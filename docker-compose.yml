version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cronos-db
    environment:
      POSTGRES_DB: cronossuper_db
      POSTGRES_USER: adminvps
      POSTGRES_PASSWORD: pwdDB@123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adminvps -d cronossuper_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cronos-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: adminvps
      DB_PASSWORD: pwdDB@123
      DB_NAME: cronossuper_db
      APP_PORT: 8080
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cronos-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
